version: '2'
services:
  influxdb:
    image: influxdb
    container_name: influxdb
    restart: always
    ports:
      - 8086:8086
    networks:
      - monitoring
    volumes:
      - influxdb-volume:/var/lib/influxdb
    environment :
      - INFLUXDB_DATA_MAX_VALUES_PER_TAG=0
      - INFLUXDB_DATA_MAX_SERIES_PER_DATABASE=1500000000
networks:
  monitoring:
      ipam:
          driver: default
          config:
              - subnet: 172.10.0.0/16
volumes:
  grafana-volume:
    external: true
  influxdb-volume:
    external: true
